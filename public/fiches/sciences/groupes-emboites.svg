<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 470" role="img" aria-label="Classification en groupes emboîtés : Vertébrés, puis Tétrapodes, puis Amniotes, puis Mammifères, chaque groupe étant défini par un caractère nouveau.">
  <style>
    .lbl { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 700; }
    .car { font-family: ui-sans-serif, system-ui, sans-serif; font-style: italic; fill: #475569; }
    .ani { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 600; fill: #0f172a; }
    .out { font-family: ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; font-style: italic; }
  </style>

  <!-- Vertébrés -->
  <rect x="16" y="16" width="648" height="438" rx="16" fill="#ecfeff" stroke="#14b8a6" stroke-width="2"/>
  <text class="lbl" x="34" y="42" font-size="17" fill="#0f766e">Vertébrés</text>
  <text class="car" x="34" y="63" font-size="13">colonne vertébrale</text>
  <text class="ani" x="566" y="50" font-size="15" text-anchor="end">Requin</text>

  <!-- Tétrapodes -->
  <rect x="58" y="84" width="564" height="354" rx="14" fill="#cffafe" stroke="#0d9488" stroke-width="2"/>
  <text class="lbl" x="76" y="110" font-size="17" fill="#0f766e">Tétrapodes</text>
  <text class="car" x="76" y="131" font-size="13">quatre membres</text>
  <text class="ani" x="606" y="118" font-size="15" text-anchor="end">Grenouille</text>

  <!-- Amniotes -->
  <rect x="100" y="152" width="480" height="270" rx="12" fill="#99f6e4" stroke="#0f766e" stroke-width="2"/>
  <text class="lbl" x="118" y="178" font-size="17" fill="#134e4a">Amniotes</text>
  <text class="car" x="118" y="199" font-size="13">œuf à amnios</text>
  <text class="out" x="564" y="186" font-size="13" text-anchor="end">(reptiles, oiseaux…)</text>

  <!-- Mammifères -->
  <rect x="142" y="220" width="396" height="180" rx="10" fill="#5eead4" stroke="#115e59" stroke-width="2"/>
  <text class="lbl" x="160" y="246" font-size="17" fill="#134e4a">Mammifères</text>
  <text class="car" x="160" y="267" font-size="13">poils, glandes mammaires</text>
  <text class="ani" x="232" y="340" font-size="16" text-anchor="middle">Dauphin</text>
  <text class="ani" x="430" y="340" font-size="16" text-anchor="middle">Homme</text>
</svg>
