<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" role="img" aria-label="Organes homologues : le membre antérieur de l'Homme, de la chauve-souris et de la baleine possède les mêmes groupes d'os (bras, avant-bras, poignet, main) hérités d'un ancêtre commun, mais avec des proportions différentes.">
  <style>
    .ttl { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 700; fill: #0f172a; }
    .leg { font-family: ui-sans-serif, system-ui, sans-serif; fill: #334155; }
    .cap { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 600; fill: #0f172a; }
  </style>

  <!-- légende des os (code couleur) -->
  <text class="ttl" x="24" y="30" font-size="15">Mêmes os, formes différentes (organes homologues)</text>
  <g font-size="12.5">
    <rect x="24" y="44" width="16" height="16" rx="3" fill="#0d9488"/><text class="leg" x="46" y="57">bras (humérus)</text>
    <rect x="190" y="44" width="16" height="16" rx="3" fill="#14b8a6"/><text class="leg" x="212" y="57">avant-bras (radius, cubitus)</text>
    <rect x="24" y="68" width="16" height="16" rx="3" fill="#5eead4"/><text class="leg" x="46" y="81">poignet (carpe)</text>
    <rect x="190" y="68" width="16" height="16" rx="3" fill="#a7f3d0"/><text class="leg" x="212" y="81">main et doigts (métacarpe, phalanges)</text>
  </g>

  <!-- ===== Homme ===== -->
  <g>
    <rect x="92"  y="92"  width="34" height="78" rx="14" fill="#0d9488"/>
    <rect x="96"  y="172" width="26" height="74" rx="11" fill="#14b8a6"/>
    <rect x="92"  y="248" width="34" height="22" rx="8"  fill="#5eead4"/>
    <rect x="86"  y="272" width="9"  height="58" rx="4"  fill="#a7f3d0"/>
    <rect x="98"  y="272" width="9"  height="64" rx="4"  fill="#a7f3d0"/>
    <rect x="110" y="272" width="9"  height="60" rx="4"  fill="#a7f3d0"/>
    <rect x="122" y="272" width="9"  height="50" rx="4"  fill="#a7f3d0"/>
    <text class="cap" x="108" y="360" font-size="13.5" text-anchor="middle">Homme</text>
    <text class="leg" x="108" y="378" font-size="11.5" text-anchor="middle">main</text>
  </g>

  <!-- ===== Chauve-souris (doigts très allongés = aile) ===== -->
  <g>
    <rect x="300" y="92"  width="28" height="60" rx="12" fill="#0d9488"/>
    <rect x="303" y="154" width="22" height="58" rx="10" fill="#14b8a6"/>
    <rect x="300" y="214" width="28" height="18" rx="7"  fill="#5eead4"/>
    <rect x="290" y="234" width="7" height="120" rx="3" fill="#a7f3d0"/>
    <rect x="303" y="234" width="7" height="138" rx="3" fill="#a7f3d0"/>
    <rect x="316" y="234" width="7" height="128" rx="3" fill="#a7f3d0"/>
    <rect x="329" y="234" width="7" height="108" rx="3" fill="#a7f3d0"/>
    <text class="cap" x="312" y="392" font-size="13.5" text-anchor="middle">Chauve-souris</text>
    <text class="leg" x="312" y="408" font-size="11.5" text-anchor="middle">aile</text>
  </g>

  <!-- ===== Baleine (nageoire courte et large) ===== -->
  <g>
    <rect x="520" y="92"  width="46" height="46" rx="16" fill="#0d9488"/>
    <rect x="524" y="140" width="38" height="40" rx="14" fill="#14b8a6"/>
    <rect x="518" y="182" width="50" height="20" rx="8"  fill="#5eead4"/>
    <rect x="514" y="204" width="11" height="74" rx="5" fill="#a7f3d0"/>
    <rect x="528" y="204" width="11" height="80" rx="5" fill="#a7f3d0"/>
    <rect x="542" y="204" width="11" height="76" rx="5" fill="#a7f3d0"/>
    <rect x="556" y="204" width="11" height="66" rx="5" fill="#a7f3d0"/>
    <text class="cap" x="541" y="300" font-size="13.5" text-anchor="middle">Baleine</text>
    <text class="leg" x="541" y="318" font-size="11.5" text-anchor="middle">nageoire</text>
  </g>
</svg>
