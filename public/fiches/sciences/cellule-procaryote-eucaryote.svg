<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-label="Comparaison d'une cellule procaryote (bactérie, sans noyau, ADN circulaire libre) et d'une cellule eucaryote (noyau délimité par une membrane, organites comme les mitochondries).">
  <style>
    .ttl { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 700; fill: #0f766e; }
    .sub { font-family: ui-sans-serif, system-ui, sans-serif; font-style: italic; fill: #64748b; }
    .lab { font-family: ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
  </style>

  <!-- ===== Procaryote ===== -->
  <text class="ttl" x="40" y="34" font-size="17">Cellule procaryote</text>
  <text class="sub" x="40" y="54" font-size="13">bactérie · pas de noyau · 1 à 10 µm</text>

  <rect x="40" y="78" width="290" height="232" rx="96" fill="#ecfeff" stroke="#0d9488" stroke-width="2.5"/>
  <!-- nucléoïde : ADN circulaire libre -->
  <ellipse cx="178" cy="196" rx="62" ry="34" fill="none" stroke="#0f766e" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text class="lab" x="178" y="200" font-size="12.5" text-anchor="middle" fill="#0f766e">ADN circulaire</text>
  <text class="lab" x="178" y="246" font-size="12.5" text-anchor="middle" fill="#0f766e">(nucléoïde, libre)</text>
  <!-- ribosomes -->
  <circle cx="110" cy="135" r="3.5" fill="#115e59"/><circle cx="250" cy="140" r="3.5" fill="#115e59"/>
  <circle cx="95" cy="245" r="3.5" fill="#115e59"/><circle cx="265" cy="250" r="3.5" fill="#115e59"/>
  <!-- membrane -->
  <text class="lab" x="186" y="100" font-size="12" text-anchor="middle" fill="#475569">membrane plasmique</text>

  <!-- ===== Eucaryote ===== -->
  <text class="ttl" x="400" y="34" font-size="17">Cellule eucaryote</text>
  <text class="sub" x="400" y="54" font-size="13">animale · noyau délimité · 10 à 100 µm</text>

  <rect x="400" y="78" width="290" height="252" rx="70" fill="#cffafe" stroke="#0d9488" stroke-width="2.5"/>
  <!-- noyau -->
  <circle cx="505" cy="190" r="58" fill="#99f6e4" stroke="#0f766e" stroke-width="2.5"/>
  <circle cx="490" cy="178" r="3" fill="#115e59"/><circle cx="515" cy="185" r="3" fill="#115e59"/><circle cx="500" cy="205" r="3" fill="#115e59"/>
  <text class="lab" x="505" y="194" font-size="12.5" text-anchor="middle" fill="#0f766e">noyau (ADN)</text>
  <!-- mitochondrie -->
  <ellipse cx="618" cy="150" rx="40" ry="20" fill="#5eead4" stroke="#115e59" stroke-width="2"/>
  <path d="M588 150 q10 -10 20 0 q10 10 20 0 q10 -10 18 0" fill="none" stroke="#115e59" stroke-width="1.6"/>
  <text class="lab" x="618" y="192" font-size="12" text-anchor="middle" fill="#475569">mitochondrie</text>
  <!-- ribosomes -->
  <circle cx="445" cy="270" r="3.5" fill="#115e59"/><circle cx="600" cy="285" r="3.5" fill="#115e59"/><circle cx="470" cy="120" r="3.5" fill="#115e59"/>
  <text class="lab" x="545" y="100" font-size="12" text-anchor="middle" fill="#475569">membrane plasmique</text>
</svg>
