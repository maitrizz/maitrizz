<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradient indigo → orange sur le trait -->
    <linearGradient id="checkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>

    <!-- Fond radial pour donner de la profondeur -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#12103a"/>
      <stop offset="100%" stop-color="#07061a"/>
    </radialGradient>

    <!-- Glow -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond sombre avec légère profondeur -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Check — trait gradient épais, glow -->
  <path d="M20,54 L38,72 L80,22"
        fill="none"
        stroke="url(#checkGrad)"
        stroke-width="11"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

</svg>
