<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>

    <!-- Gradient radial : fuchsia → violet → indigo profond -->
    <radialGradient id="bg" cx="36%" cy="36%" r="68%">
      <stop offset="0%"   stop-color="#d946ef"/>
      <stop offset="42%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>

    <!-- Clip pour garder tout dans le cercle -->
    <clipPath id="clip">
      <circle cx="50" cy="50" r="47.5"/>
    </clipPath>

    <!-- Glow discret sur le M -->
    <filter id="glowM" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Fond -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Contour subtil -->
  <circle cx="50" cy="50" r="47" fill="none"
          stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <g clip-path="url(#clip)">

    <!-- M — trait blanc épais, arrondi -->
    <path d="M22,56 L22,15 L50,41 L78,15 L78,56"
          fill="none"
          stroke="white"
          stroke-width="11.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#glowM)"/>

    <!-- Tiges de la couronne -->
    <path d="M50,88 Q29,81 15,63"
          fill="none" stroke="#5eead4" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M50,88 Q71,81 85,63"
          fill="none" stroke="#5eead4" stroke-width="1.3" stroke-linecap="round"/>

    <!-- Feuilles gauche (5 feuilles, rotation croissante) -->
    <ellipse cx="44" cy="84" rx="7"   ry="2.6" fill="#5eead4" transform="rotate(-22, 44, 84)"/>
    <ellipse cx="36" cy="79" rx="6.5" ry="2.4" fill="#5eead4" transform="rotate(-36, 36, 79)"/>
    <ellipse cx="27" cy="73" rx="6"   ry="2.3" fill="#5eead4" transform="rotate(-50, 27, 73)"/>
    <ellipse cx="20" cy="67" rx="5.5" ry="2.1" fill="#5eead4" transform="rotate(-63, 20, 67)"/>
    <ellipse cx="15" cy="62" rx="5"   ry="2"   fill="#5eead4" transform="rotate(-74, 15, 62)"/>

    <!-- Feuilles droite (miroir) -->
    <ellipse cx="56" cy="84" rx="7"   ry="2.6" fill="#5eead4" transform="rotate(22,  56, 84)"/>
    <ellipse cx="64" cy="79" rx="6.5" ry="2.4" fill="#5eead4" transform="rotate(36,  64, 79)"/>
    <ellipse cx="73" cy="73" rx="6"   ry="2.3" fill="#5eead4" transform="rotate(50,  73, 73)"/>
    <ellipse cx="80" cy="67" rx="5.5" ry="2.1" fill="#5eead4" transform="rotate(63,  80, 67)"/>
    <ellipse cx="85" cy="62" rx="5"   ry="2"   fill="#5eead4" transform="rotate(74,  85, 62)"/>

    <!-- Nœud central -->
    <circle cx="50" cy="89" r="2.8" fill="#5eead4"/>
    <circle cx="50" cy="89" r="1.1" fill="rgba(255,255,255,0.5)"/>

  </g>

</svg>
