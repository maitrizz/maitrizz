<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- Fond indigo profond, coins arrondis -->
  <rect width="100" height="100" rx="24" fill="#312e81"/>

  <!-- M stylisé — même qu'en v2 -->
  <path d="M14,76 L14,28 L50,54 L86,28 L86,76"
        fill="none"
        stroke="white"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Couronne de laurier orange -->
  <!-- Tige gauche (courbe) -->
  <path d="M50,46 Q34,36 30,20"
        fill="none" stroke="#fb923c" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Tige droite (miroir) -->
  <path d="M50,46 Q66,36 70,20"
        fill="none" stroke="#fb923c" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Feuilles gauche — 3 feuilles le long de la branche -->
  <ellipse cx="44" cy="38" rx="6.5" ry="2.4" fill="#fb923c" transform="rotate(-48, 44, 38)"/>
  <ellipse cx="37" cy="29" rx="5.5" ry="2.2" fill="#fb923c" transform="rotate(-48, 37, 29)"/>
  <ellipse cx="31" cy="21" rx="4.5" ry="1.8" fill="#fb923c" transform="rotate(-48, 31, 21)"/>

  <!-- Feuilles droite — miroir -->
  <ellipse cx="56" cy="38" rx="6.5" ry="2.4" fill="#fb923c" transform="rotate(48, 56, 38)"/>
  <ellipse cx="63" cy="29" rx="5.5" ry="2.2" fill="#fb923c" transform="rotate(48, 63, 29)"/>
  <ellipse cx="69" cy="21" rx="4.5" ry="1.8" fill="#fb923c" transform="rotate(48, 69, 21)"/>

  <!-- Petit nœud central à la base des deux branches -->
  <circle cx="50" cy="46" r="2.2" fill="#fb923c"/>

</svg>
